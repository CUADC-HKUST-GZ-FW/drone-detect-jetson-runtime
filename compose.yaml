name: drone-detect

services:
  drone-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: drone-detect-webui:local
    container_name: "drone-runner-${NODE_ROLE:-local}"
    network_mode: host
    pid: host
    ipc: host
    privileged: true
    runtime: nvidia
    environment:
      DRONE_SERVICE: runner
      DRONE_EXEC_MODE: nsenter
      NODE_ROLE: "${NODE_ROLE:-standalone}"
      PROJECT_DIR: /workspace
      HOST_PROJECT_DIR: "${HOST_PROJECT_DIR:-/opt/drone-detect}"
      DRONE_INTERFACE: "${DRONE_INTERFACE:-eth0}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - .:/workspace
      - ./webui:/app/webui:ro
      - /run:/run
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python3", "-m", "uvicorn", "webui.app:app", "--host", "0.0.0.0", "--port", "18081"]
    restart: unless-stopped

  drone-webui:
    image: drone-detect-webui:local
    container_name: "drone-webui-${NODE_ROLE:-local}"
    network_mode: host
    depends_on:
      - drone-runner
    environment:
      DRONE_SERVICE: webui
      DRONE_EXEC_MODE: proxy
      DRONE_RUNNER_URL: "${DRONE_RUNNER_URL:-http://127.0.0.1:18081}"
      NODE_ROLE: "${NODE_ROLE:-standalone}"
      PROJECT_DIR: /workspace
      HOST_PROJECT_DIR: "${HOST_PROJECT_DIR:-/opt/drone-detect}"
      DRONE_INTERFACE: "${DRONE_INTERFACE:-eth0}"
    volumes:
      - .:/workspace:ro
      - ./webui:/app/webui:ro
    command: ["python3", "-m", "uvicorn", "webui.app:app", "--host", "0.0.0.0", "--port", "18080"]
    restart: unless-stopped

  drone-edge-agent:
    image: drone-detect-webui:local
    container_name: "drone-edge-agent-${EDGE_NODE_ID:-local}"
    network_mode: host
    pid: host
    ipc: host
    privileged: true
    runtime: nvidia
    depends_on:
      - drone-runner
    working_dir: /workspace
    environment:
      DRONE_SERVICE: edge-agent
      NODE_ROLE: "${NODE_ROLE:-standalone}"
      EDGE_NODE_ID: "${EDGE_NODE_ID:-jetson_01}"
      PROJECT_DIR: /workspace
      HOST_PROJECT_DIR: "${HOST_PROJECT_DIR:-/opt/drone-detect}"
      DRONE_INTERFACE: "${DRONE_INTERFACE:-eth0}"
      MQTT_HOST: "${MQTT_HOST:-127.0.0.1}"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      EDGE_TELEMETRY_INTERVAL: "${EDGE_TELEMETRY_INTERVAL:-1.0}"
      EDGE_TELEMETRY_INCLUDE_RAW_QDISC: "${EDGE_TELEMETRY_INCLUDE_RAW_QDISC:-0}"
      EDGE_DEFAULT_ROLLBACK_SECONDS: "${EDGE_DEFAULT_ROLLBACK_SECONDS:-60}"
      EDGE_TC_DRY_RUN_ONLY: "${EDGE_TC_DRY_RUN_ONLY:-0}"
      EDGE_TC_BACKEND: "${EDGE_TC_BACKEND:-simple}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - .:/workspace
      - /run:/run
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["python3", "scripts/edge_mqtt_agent.py"]
    restart: unless-stopped
