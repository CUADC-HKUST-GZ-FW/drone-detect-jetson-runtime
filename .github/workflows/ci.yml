name: CI

on:
  push:
  pull_request:

jobs:
  webui-and-repo-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run WebUI smoke tests
        run: python3 webui/tests/e2e_smoke.py

      - name: Reject large generated artifacts
        run: |
          set -euo pipefail
          forbidden="$(
            find . -type f \
              \( -name '*.pt' -o -name '*.pth' -o -name '*.onnx' -o -name '*.engine' -o -name '*.plan' -o -name '*.trt' \
                 -o -name '*.mp4' -o -name '*.avi' -o -name '*.mov' -o -name '*.mkv' -o -name '*.ts' \
                 -o -name '*.log' -o -size +5M \) \
              -not -path './.git/*' \
              -print
          )"
          if [ -n "$forbidden" ]; then
            echo "$forbidden"
            exit 1
          fi

      - name: Reject local lab secrets and paths
        run: |
          set -euo pipefail
          bad_user="$(printf 'hkus%s' 'tgz')"
          bad_home="/home/${bad_user}"
          bad_ip='10[.]7[.]172[.]105'
          sudo_pipe_pattern="$(printf 'printf "%%s\\\\n" .*\\| sudo %s' '-S')"
          key_pattern="$(printf 'BEGIN (%s|%s|%s|%s) PRIVATE KEY' 'RSA' 'OPENSSH' 'DSA' 'EC')"
          token_pattern_a="$(printf 'gh%s_' 'p')"
          token_pattern_b="$(printf 'github_%s_' 'pat')"
          aws_key_pattern="$(printf 'AKI%s[0-9A-Z]{16}' 'A')"
          pattern="(${bad_home}|\\b${bad_user}\\b|${bad_ip}|${sudo_pipe_pattern}|${key_pattern}|${token_pattern_a}|${token_pattern_b}|${aws_key_pattern})"
          if grep -RInE "$pattern" . --exclude-dir=.git; then
            exit 1
          fi
