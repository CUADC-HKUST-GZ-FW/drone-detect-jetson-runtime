name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install pytest pyyaml
      - name: Run unit tests
        run: python -m pytest
      - name: Check forbidden binary artifacts
        run: |
          if git ls-files | grep -E '\.(pt|pth|onnx|engine|raw\.engine|mp4|zip|tar|gz|ko)$'; then
            echo "Forbidden binary artifact is tracked"
            exit 1
          fi
